version: '3.8'

services:
  db:
    image: postgres:16
    container_name: fenix_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fenix_evolucao
    ports:
      - "5432:5432"
    volumes:
      - fenix_data:/var/lib/postgresql/data

volumes:
  fenix_data:
