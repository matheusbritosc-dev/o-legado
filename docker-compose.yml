services:
  api:
    build: 
      context: ./backend/fenix_evolucao
      dockerfile: Dockerfile
    container_name: fenix_api
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/fenix_evolucao
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fenix_net

  db:
    image: postgres:16
    container_name: fenix_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fenix_evolucao
    ports:
      - "5432:5432"
    volumes:
      - fenix_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fenix_net

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: fenix_tunnel
    restart: always
    command: tunnel --no-autoupdate --url http://api:8000
    depends_on:
      - api
    networks:
      - fenix_net

networks:
  fenix_net:
    driver: bridge

volumes:
  fenix_data:
